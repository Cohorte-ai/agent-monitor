site_name: theaios-agent-monitor
site_url: https://cohorte-ai.github.io/agent-monitor/
site_description: Governance-first observability for AI agents
site_author: Charafeddine Mouzouni
repo_url: https://github.com/Cohorte-ai/agent-monitor
repo_name: Cohorte-ai/agent-monitor

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep-purple
      accent: deep-purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep-purple
      accent: deep-purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - def_list

nav:
  - Home: index.md
  - Getting Started:
      - Concepts: concepts.md
      - Events: events.md
      - Config Syntax: config-syntax.md
  - Guides:
      - Metrics & Baselines: metrics-and-baselines.md
      - Kill Switches: kill-switches.md
      - Compliance Export: compliance.md
      - Integration Guide: integration.md
  - Reference:
      - CLI: cli.md
      - Python API: api-reference.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Cohorte-ai/agent-monitor

copyright: Copyright &copy; 2026 Charafeddine Mouzouni / Cohorte AI
